# Template workflow — copy this file to .github/workflows/terraform.yml in your
# downstream project repository. It is not executed from this location.
name: Terraform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required for GitHub OIDC token issuance and PR comment posting
permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    # If your Terraform files are in a subdirectory, uncomment and set this:
    # defaults:
    #   run:
    #     working-directory: infra

    env:
      TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Caches downloaded providers keyed on the lock file. Cache is invalidated
      # automatically when provider versions are updated.
      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      # Authenticates using the per-project IAM role created by new-project.sh.
      # No long-lived credentials are stored — GitHub exchanges the OIDC token for
      # temporary AWS credentials scoped to this role.
      #
      # Prerequisites (set in GitHub → Settings → Secrets and variables → Actions):
      #   TF_ROLE_ARN  (variable) — role ARN output by new-project.sh
      #   AWS_REGION   (variable) — e.g. us-east-1
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.TF_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # backend.conf contains bucket, region, key, dynamodb_table, and kms_key_id.
      # It is safe to commit — it contains no secrets.
      # Generate it by running new-project.sh and saving the printed output.
      - name: Terraform Init
        run: terraform init -backend-config=backend.conf

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      # Runs on every push and pull request. Produces a plan without applying.
      - name: Terraform Plan
        run: |
          terraform plan \
            -var="aws_account_id=${{ vars.AWS_ACCOUNT_ID }}" \
            -var="aws_region=${{ vars.AWS_REGION }}" \
            -var="project_name=${{ vars.TF_PROJECT_NAME }}" \
            -var="role_arn=${{ vars.TF_ROLE_ARN }}" \
            -no-color \
            -out=tfplan

      # Renders the saved plan as human-readable text for the PR comment.
      # Writes to GITHUB_WORKSPACE (repo root) so the github-script step can read it —
      # github-script does not inherit working-directory from defaults.run.
      - name: Render Plan
        if: github.event_name == 'pull_request'
        run: terraform show -no-color tfplan > $GITHUB_WORKSPACE/plan.txt

      # Posts the plan output as a PR comment so reviewers can see exactly what will change.
      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync(process.env.GITHUB_WORKSPACE + '/plan.txt', 'utf8');
            const maxLength = 65000;
            const body = plan.length > maxLength
              ? `#### Terraform Plan\n\`\`\`\n${plan.substring(0, maxLength)}\n...(truncated)\n\`\`\``
              : `#### Terraform Plan\n\`\`\`\n${plan}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # Applies only on merge to main. Requires a successful plan in the same run.
      # Recommendation: protect the main branch (require PRs + passing status checks)
      # so that apply only runs after a reviewed plan, never on a direct push.
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
